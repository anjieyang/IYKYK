<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">UncommonRoute cost savings</title>
  <desc id="desc">Before UncommonRoute every request is routed to Claude Opus. After UncommonRoute requests are split across multiple models and total cost is reduced by 67 percent.</desc>
  <rect width="1200" height="560" fill="#050816" rx="24"/>
  <rect x="24" y="24" width="1152" height="512" rx="22" fill="#0b1220" stroke="#1e293b"/>
  <text x="600" y="58" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" text-anchor="middle">
    Before vs After UncommonRoute
  </text>
  <text x="600" y="92" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="18" text-anchor="middle">
    Same coding session. Same user. Much less premium-model waste.
  </text>
  <rect x="470" y="108" width="260" height="34" rx="17" fill="#14532d"/>
  <text x="600" y="131" fill="#dcfce7" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" text-anchor="middle">
    67% lower cost • 93.5% quality retained
  </text>

  <rect x="50" y="160" width="520" height="320" rx="20" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <text x="80" y="205" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">
    Before UncommonRoute
  </text>
  <text x="80" y="235" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="17">
    Every request is treated like it needs the most expensive model
  </text>
  <rect x="80" y="275" width="460" height="72" rx="14" fill="#f97316"/>
  <text x="310" y="318" fill="#fff7ed" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" text-anchor="middle">
    anthropic/claude-opus-4.6
  </text>
  <text x="80" y="382" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">
    Total cost: $1.7529
  </text>
  <text x="80" y="412" fill="#fda4af" font-family="Arial, Helvetica, sans-serif" font-size="17">
    Great for the hardest prompts, wasteful for everything else
  </text>
  <text x="80" y="448" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="16">
    131-request coding session: one model, one giant bill
  </text>

  <rect x="630" y="160" width="520" height="320" rx="20" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <text x="660" y="205" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">
    After UncommonRoute
  </text>
  <text x="660" y="235" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="17">
    Each request goes to the cheapest model that can still do the job
  </text>

  <rect x="660" y="275" width="96" height="72" rx="14" fill="#22c55e"/>
  <rect x="764" y="275" width="156" height="72" rx="14" fill="#38bdf8"/>
  <rect x="928" y="275" width="170" height="72" rx="14" fill="#a855f7"/>
  <text x="708" y="300" fill="#052e16" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" text-anchor="middle">
    SIMPLE
  </text>
  <text x="708" y="322" fill="#052e16" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" text-anchor="middle">
    Kimi
  </text>
  <text x="842" y="300" fill="#082f49" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" text-anchor="middle">
    MEDIUM / COMPLEX
  </text>
  <text x="842" y="322" fill="#082f49" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" text-anchor="middle">
    Gemini
  </text>
  <text x="1013" y="300" fill="#faf5ff" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" text-anchor="middle">
    REASONING / FALLBACK
  </text>
  <text x="1013" y="322" fill="#faf5ff" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" text-anchor="middle">
    Grok / Sonnet
  </text>
  <text x="660" y="382" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">
    Total cost: $0.5801
  </text>
  <text x="660" y="412" fill="#86efac" font-family="Arial, Helvetica, sans-serif" font-size="17">
    67% lower cost with 93.5% quality retained
  </text>
  <text x="660" y="448" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="16">
    131-request coding session: mixed models, much smaller bill
  </text>

  <path d="M585 318 L615 318" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <path d="M607 308 L621 318 L607 328" fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="420" y="500" width="360" height="34" rx="17" fill="#14532d"/>
  <text x="600" y="523" fill="#dcfce7" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" text-anchor="middle">
    Keep the hard prompts smart. Route the rest cheaper.
  </text>
</svg>
